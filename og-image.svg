    <circle cx="112" cy="615" r="70" fill="#6d28d9" opacity="0.13"/>
    <circle cx="176" cy="175" r="57" fill="#6d28d9" opacity="0.14"/>
    <circle cx="1166" cy="108" r="72" fill="#6d28d9" opacity="0.07"/>
    <circle cx="1096" cy="128" r="49" fill="#6d28d9" opacity="0.08"/>
    <rect x="3" y="294" width="63" height="41" rx="8" fill="#7c3aed" opacity="0.11" transform="rotate(35, 440, -52)"/>
    <rect x="346" y="111" width="74" height="86" rx="8" fill="#7c3aed" opacity="0.10" transform="rotate(36, 493, 615)"/>
